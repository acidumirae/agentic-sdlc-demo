name: Comprehensive Agentic SDLC
version: 1.0.0
description: A formalized state machine for autonomous software development.

modes:
  - strict: true # Prevent agents from bypassing process
  - require_human_approval_on_deploy: true

phases:
  - id: product_planning
    name: Planning & Requirements
    agent_role: Product Manager
    entry_condition: "New feature request or issue created"
    required_outputs:
      - filepath: docs/specs/*_spec.md
    transitions_to: architecture_design

  - id: architecture_design
    name: Architecture
    agent_role: Architect
    entry_condition: "Spec approved"
    required_outputs:
      - filepath: docs/arch/*_architecture.md
      - filepath: docs/arch/*.mermaid
    transitions_to: implementation

  - id: implementation
    name: Implementation
    agent_role: Developer
    entry_condition: "Architecture approved"
    required_outputs:
      - filepath: src/**
      - filepath: tests/**
    transitions_to: qa_verification

  - id: qa_verification
    name: Verification & Testing
    agent_role: QA Engineer
    entry_condition: "Code compiled and basic tests exist"
    required_outputs:
      - filepath: docs/reports/test_run.json
    transitions_to: code_review

  - id: code_review
    name: Review & Handoff
    agent_role: Security & Review Engineer
    entry_condition: "All tests passing"
    transitions_to: complete
