name: Agentic SDLC Full Cycle
version: "1.0"
description: >
  Defines the chronological orchestration of specialized AI agents 
  from Requirements Gathering through to Operations & Deployment.

trigger:
  type: git_push
  branches: [ "main", "feature/*" ]

phases:
  - id: requirements-and-planning
    agent_pool: [ "planning-agent" ]
    action: "extract_requirements"
    skill_dependency: "extract_requirements.py"
    output:
      - "docs/planning/planning.md"
    require_approval: true

  - id: design-and-prototyping
    depends_on: [ requirements-and-planning ]
    agent_pool: [ "design-agent" ]
    action: "generate_mockups"
    skill_dependency: "generate_prototype.py"
    output:
      - "src/ui/components/"
    require_approval: true

  - id: development-and-refactoring
    depends_on: [ design-and-prototyping ]
    agent_pool: [ "development-agent" ]
    action: "implement_features"
    require_approval: false

  - id: testing-and-debugging
    depends_on: [ development-and-refactoring ]
    agent_pool: [ "testing-agent" ]
    action: "run_test_synthesis_and_fix"
    skill_dependency: "synthesize_tests.py"
    metrics:
      target_coverage: "95%"
    require_approval: false

  - id: security-review
    depends_on: [ development-and-refactoring ]
    agent_pool: [ "security-agent" ]
    action: "static_analysis_and_cve_check"
    block_on_critical: true

  - id: deployment-and-operations
    depends_on: [ testing-and-debugging, security-review ]
    agent_pool: [ "deployment-agent" ]
    action: "predictive_deploy"
    skill_dependency: "deployment_predictor.py"
    strategy: "canary"
    require_approval: true
